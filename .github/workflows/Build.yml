name: Build APK with Buildozer

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🚀 Buildozer Action: Ye khud SDK, NDK aur API 33 handle karega
      - name: Build APK
        uses: ArtemSerebrennikov/buildozer-action@v1
        with:
          buildozer_version: stable
          python_version: 3.11
          # Ye niche wala command licenses ko auto-accept karega
          command: buildozer android debug
          repository_read_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StudyLike-PRO-APK
          path: bin/*.apk
