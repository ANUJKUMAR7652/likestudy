name: Build APK with Buildozer

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🚀 Official Kivy Buildozer Action - Sabse Reliable tareeka
      - name: Build with Buildozer
        uses: kivy/buildozer-action@v1
        with:
          save_buildozer_config: false
          python_version: 3.11

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: StudyLike-PRO-APK
          path: bin/*.apk
