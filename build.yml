name: Build APK with Buildozer

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Python Dependencies (Buildozer & Cython)
        run: |
          # Buildozer इंस्टॉल करें
          pip3 install --user --upgrade buildozer "cython<3.0.0" virtualenv --break-system-packages
          
          # 🚀 यहाँ सबसे ज़रूरी बदलाव है: Buildozer को Path में जोड़ना
          echo "PATH=$PATH:$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK (इसमें 15-20 मिनट लग सकते हैं)
        run: |
          # अब सिस्टम buildozer कमांड को पहचान लेगा
          buildozer android debug

      - name: Upload APK File
        uses: actions/upload-artifact@v3
        with:
          name: StudyLike_PRO_APK
          path: bin/*.apk
